name: Release Minor Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.2.0). Must bump minor or major.'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ github.event.inputs.version }}
